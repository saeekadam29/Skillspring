<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* --- Basic Reset and Typography --- */
        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f7f9;
            color: #333;
        }

        /* --- Header/Navigation --- */
        header {
            background-color: #007bff;
            color: white;
            padding: 1rem 0;
            text-align: center;
        }
        header h1 {
            margin: 0;
            font-size: 2.5em;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }

        /* --- Main Content Layout --- */
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
        }

        /* --- Search & Filter Bar (new) --- */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }
        .search-box {
            padding: 10px 16px;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.95em;
            width: 280px;
            outline: none;
            transition: border-color .2s;
        }
        .search-box:focus { border-color: #007bff; }

        .filter-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .filter-btn {
            padding: 8px 18px;
            border: 1.5px solid #007bff;
            border-radius: 999px;
            background: white;
            color: #007bff;
            font-size: 0.88em;
            font-weight: bold;
            cursor: pointer;
            transition: all .2s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #007bff;
            color: white;
        }

        .results-count {
            text-align: center;
            font-size: 0.88em;
            color: #999;
            margin-bottom: 20px;
        }

        /* --- News Article Card Styling --- */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }
        .article-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(0,0,0,.1);
            overflow: hidden;
            transition: transform 0.3s ease, opacity .3s ease;
        }
        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,.15);
        }
        .article-card.hidden {
            display: none;
        }
        .article-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }
        .article-content {
            padding: 20px;
        }
        .article-content h3 {
            margin-top: 0;
            color: #007bff;
            font-size: 1.2em;
            line-height: 1.4;
        }
        .article-content p {
            font-size: 0.95em;
            color: #555;
        }
        .article-meta {
            font-size: 0.8em;
            color: #999;
            margin-bottom: 10px;
        }
        .cat-badge {
            display: inline-block;
            background: #e8f4ff;
            color: #007bff;
            font-size: 0.75em;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 999px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: .4px;
        }
        .read-more {
            display: inline-block;
            color: #28a745;
            text-decoration: none;
            font-weight: bold;
            margin-top: 10px;
        }
        .read-more:hover { text-decoration: underline; }

        /* No results message */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-size: 1.1em;
            display: none;
            width: 100%;
        }

        /* --- Footer --- */
        footer {
            text-align: center;
            padding: 20px;
            background-color: #333;
            color: white;
            margin-top: 40px;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .search-box { width: 100%; }
        }
    </style>
</head>
<body>

    <header>

        <nav>
            <a href="index (6).html">Go back to Home</a>

    <div class="container">

        <!-- Search & Filter -->

            <input type="text" class="search-box" id="searchBox" placeholder="🔍 Search articles…" oninput="filterArticles()" />
        </div>
        <div class="filter-btns" id="filterBtns">
            <button class="filter-btn active" data-cat="All" onclick="setFilter(this)">All</button>
        </div>
        <p class="results-count" id="resultsCount"></p>

        <!-- Grid -->
        <div class="news-grid" id="articles"></div>
        <div class="no-results" id="noResults">😕 No articles found. Try a different search or filter.</div>
    </div>

    <footer>

// ── BUILD FILTER BUTTONS ──────────────────────────────────────
const categories = ['All', ...new Set(articles.map(a => a.cat))];
const filterBtns = document.getElementById('filterBtns');
filterBtns.innerHTML = '';
categories.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (cat === 'All' ? ' active' : '');
  btn.dataset.cat = cat;
  btn.textContent = cat;
  btn.onclick = function(){ setFilter(this); };
  filterBtns.appendChild(btn);
});

// ── RENDER CARDS ──────────────────────────────────────────────
function renderCards() {
  const grid = document.getElementById('articles');
  grid.innerHTML = '';
  articles.forEach((a, i) => {
    const card = document.createElement('article');
    card.className = 'article-card';
    card.dataset.cat = a.cat;
    card.dataset.index = i;

    const img = document.createElement('img');
    img.alt = a.title;
    img.src = a.img;
    if (a.imgFallback) img.onerror = function(){ this.src = a.imgFallback; };

    card.innerHTML = `
      <div class="article-content">
        <span class="cat-badge">${a.cat}</span>
        <div class="article-meta">${a.cat} | ${a.date}</div>
        <h3>${a.title}</h3>
        <p>${a.desc}</p>
        <a href="${a.url}" target="_blank" rel="noopener" class="read-more">Read Full Story &rarr;</a>
      </div>`;
    card.insertBefore(img, card.firstChild);
    grid.appendChild(card);
  });
  filterArticles();
}

// ── FILTER & SEARCH ───────────────────────────────────────────
let activeCategory = 'All';

function setFilter(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeCategory = btn.dataset.cat;
  filterArticles();
}

function filterArticles() {
  const query = document.getElementById('searchBox').value.toLowerCase().trim();
  const cards = document.querySelectorAll('.article-card');
  let visible = 0;

  cards.forEach(card => {
    const catMatch = activeCategory === 'All' || card.dataset.cat === activeCategory;
    const text = card.innerText.toLowerCase();
    const searchMatch = !query || text.includes(query);
    if (catMatch && searchMatch) {
      card.classList.remove('hidden');
      visible++;
    } else {
      card.classList.add('hidden');
    }
  });

  const total = articles.length;
  document.getElementById('resultsCount').textContent =
    visible === total ? `Showing all ${total} articles`
    : `Showing ${visible} of ${total} articles`;

  document.getElementById('noResults').style.display = visible === 0 ? 'block' : 'none';
}

renderCards();
document.getElementById('yr').textContent = new Date().getFullYear();
